function buildSectionChildContent(child) {
  switch (child.type) {
    case 'note': {
      const t = child.typography || {};
      const style = [
        `font-family:${t.fontFamily||'Inter'}`,
        `font-size:${t.fontSize||13}px`,
        `font-weight:${t.fontWeight||400}`,
        `font-style:${t.italic?'italic':'normal'}`,
        `text-decoration:${t.underline?'underline':'none'}`,
        `text-align:${t.align||'left'}`,
        `color:${t.color||'#EFEDE7'}`,
        `line-height:${t.lineHeight||1.55}`,
        `letter-spacing:${(t.letterSpacing||0)}em`
      ].join(';');
      return `<div class="note-content" contenteditable="true" data-placeholder="Start writing…" style="${style}">${child.content.text||''}</div>`;
    }
    case 'todo': {
      const items = child.content.items || [];
      return `<div class="todo-title" contenteditable="true">${child.content.title||''}</div>
        <div class="todo-list">${items.map(item=>`
          <div class="todo-item" data-item-id="${item.id}">
            <div class="todo-check${item.done?' checked':''}"></div>
            <div class="todo-text${item.done?' done':''}" contenteditable="true">${item.text||''}</div>
          </div>`).join('')}
        </div>
        <div class="todo-add"><div class="todo-add-icon">+</div><div class="todo-add-label">Add item</div></div>`;
    }
    case 'image': {
      if (child.content.src) {
        const cx = child.content.cropX !== undefined ? child.content.cropX : 50;
        const cy = child.content.cropY !== undefined ? child.content.cropY : 50;
        return `<img src="${child.content.src}" style="width:100%;height:auto;display:block;object-fit:cover;object-position:${cx}% ${cy}%">`;
      }
      return `<div class="image-drop-zone" style="margin:8px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M3 17l5-5 4 4 3-3 5 5"/></svg>
        Drop image</div>`;
    }
    case 'link': {
      return `<div class="link-url-bar" style="padding:6px 8px 6px 0;border-bottom:1px solid var(--separator)">
        <input type="text" class="link-url-input" placeholder="Paste a URL…" value="${child.content.url||''}">
        <button class="link-go-btn"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2"><path d="M2 5h6M5 2l3 3-3 3"/></svg></button>
      </div>
      ${child.content.url?`<div class="link-preview" style="padding:6px 0 0">
        <div class="link-domain">${child.content.favicon?`<img class="link-favicon" src="${child.content.favicon}">`:``}<div class="link-domain-chip">${getDomain(child.content.url)}</div></div>
        <div class="link-title">${child.content.title||child.content.url}</div>
      </div>`:''}`;
    }
    case 'swatch': {
      const color = child.content.color||'#C9102E';
      return `<div style="display:flex;align-items:center;gap:10px">
        <div class="swatch-fill" style="width:38px;height:38px;border-radius:8px;background:${color};flex-shrink:0;cursor:pointer"></div>
        <div><div class="swatch-name" contenteditable="true" style="font-size:12px;font-weight:500;outline:none;min-height:16px">${child.content.name||''}</div>
        <div class="swatch-hex" style="font-family:'SF Mono','Fira Code',monospace;font-size:11px;color:var(--text-secondary)">${color}</div></div>
      </div>`;
    }
    case 'document': {
      const title = child.content.title || 'Untitled Document';
      const rawText = child.content.html ? child.content.html.replace(/<[^>]+>/g, ' ').replace(/\s+/g,' ').trim() : '';
      return `<div style="display:flex;flex-direction:column;gap:5px;padding:2px 0">
        <div style="display:flex;align-items:center;gap:7px">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--brand-red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <div style="font-size:12px;font-weight:600;color:var(--brand-red);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1">${title}</div>
        </div>
        ${rawText ? `<div style="font-size:11px;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${rawText}</div>` : '<div style="font-size:11px;color:var(--text-tertiary);font-style:italic">Empty document</div>'}
      </div>`;
    }
    case 'file': {
      const filename = child.content.filename || 'Untitled File';
      const ext = filename.includes('.') ? filename.split('.').pop().toUpperCase() : 'FILE';
      return `<div style="display:flex;align-items:center;gap:10px;padding:2px 0">
        <div style="width:30px;height:36px;border-radius:4px;background:var(--brand-red);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <span style="font-size:7px;font-weight:700;color:#EFEDE7;letter-spacing:0.04em">${ext}</span>
        </div>
        <div style="font-size:12px;font-weight:500;color:var(--brand-red);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${filename}</div>
      </div>`;
    }
    case 'table': {
      // Use the real table HTML so it looks identical to the standalone card.
      // --th-bg / --th-text are set on the section child element in createSectionChildEl.
      return buildTableHTML(child);
    }
    default: return '';
  }
}

function renderSectionChildren(sectionCard, sectionEl) {
  const content = sectionEl.querySelector('.section-content');
  if (!content) return;
  content.innerHTML = '';

  const children = sectionCard.content.children || [];

  addInsertIndicator(content, 0);

  if (children.length === 0) {
    const hint = document.createElement('div');
    hint.className = 'section-empty-hint';
    hint.textContent = 'Drag cards here to add them';
    content.appendChild(hint);
  } else {
    children.forEach((child, idx) => {
      const childEl = createSectionChildEl(child);
      content.appendChild(childEl);

      const handle = childEl.querySelector('.section-child-handle');
      if (handle) handle.addEventListener('mousedown', e => {
        e.stopPropagation();
        startSectionChildDrag(e, sectionCard, sectionEl, child.id);
      });

      childEl.addEventListener('mousedown', e => {
        e.stopPropagation();

        const wasSelected = childEl.classList.contains('sc-selected');

        // Deselect other children in this section
        content.querySelectorAll('.section-child.sc-selected').forEach(c => {
          if (c !== childEl) c.classList.remove('sc-selected');
        });
        childEl.classList.add('sc-selected');

        // If already selected and clicking directly on interactive content → let it focus
        if (wasSelected && e.target.closest('[contenteditable], input, button, .link-go-btn, .todo-add, .image-drop-zone')) {
          return; // pass through to browser focus behavior
        }

        // First click on interactive target → prevent focus this time (selection only)
        if (!wasSelected && e.target.closest('[contenteditable], input, button, .link-go-btn')) {
          e.preventDefault();
        }

        // Threshold drag detection from anywhere on the child
        const sx = e.clientX, sy = e.clientY;
        function onMove(mv) {
          if (Math.abs(mv.clientX - sx) > 5 || Math.abs(mv.clientY - sy) > 5) {
            cleanup();
            startSectionChildDrag({ clientX: sx, clientY: sy, preventDefault(){}, stopPropagation(){} }, sectionCard, sectionEl, child.id);
          }
        }
        function cleanup() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', cleanup); }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', cleanup);
      });

      attachSectionChildContentEvents(childEl, child, sectionCard, sectionEl);
      addInsertIndicator(content, idx + 1);
    });
  }
}

function addInsertIndicator(container, idx) {
  const ind = document.createElement('div');
  ind.className = 'section-insert-indicator';
  ind.dataset.idx = String(idx);
  container.appendChild(ind);
}

function createSectionChildEl(child) {
  const el = document.createElement('div');
  el.className = `section-child child-type-${child.type}`;
  el.dataset.childId = child.id;
  if (child.type === 'table') {
    const hColor = child.style?.background || '#C9102E';
    el.style.setProperty('--th-bg', hColor);
    el.style.setProperty('--th-text', textColorForBg(hColor) === 'light' ? 'var(--brand-red)' : '#EFEDE7');
  }
  el.innerHTML = `
    <div class="section-child-handle">
      <div class="section-child-handle-dots">
        <span><i></i><i></i></span><span><i></i><i></i></span><span><i></i><i></i></span>
      </div>
    </div>
    <div class="section-child-body">${buildSectionChildContent(child)}</div>
  `;
  return el;
}

function attachSectionChildContentEvents(childEl, child, sectionCard, sectionEl) {
  if (child.type === 'note') {
    const content = childEl.querySelector('.note-content');
    if (content) {
      content.addEventListener('focus', () => { activeNoteCard = child; showTypoToolbar(childEl, child); });
      content.addEventListener('blur', () => { setTimeout(() => { if (!typoToolbar.contains(document.activeElement)) hideTypoToolbar(); }, 150); });
      content.addEventListener('input', () => { child.content.text = content.innerHTML; saveState(); });
    }
  }
  if (child.type === 'todo') {
    const titleEl = childEl.querySelector('.todo-title');
    if (titleEl) titleEl.addEventListener('input', () => { child.content.title = titleEl.innerText; saveState(); });
    childEl.addEventListener('click', e => {
      const check = e.target.closest('.todo-check');
      if (check) {
        const itemEl = check.closest('.todo-item');
        const item = child.content.items.find(i => i.id === itemEl.dataset.itemId);
        if (item) { item.done = !item.done; check.classList.toggle('checked', item.done); itemEl.querySelector('.todo-text').classList.toggle('done', item.done); saveState(); }
        return;
      }
      if (e.target.closest('.todo-add')) {
        child.content.items.push({ id: uid(), text: '', done: false });
        renderSectionChildren(sectionCard, sectionEl);
        saveState();
      }
    });
    childEl.querySelectorAll('.todo-text').forEach(textEl => {
      const itemId = textEl.closest('.todo-item').dataset.itemId;
      textEl.addEventListener('input', () => { const item = child.content.items.find(i => i.id === itemId); if (item) { item.text = textEl.innerText; saveState(); } });
    });
  }
  if (child.type === 'image') {
    const dz = childEl.querySelector('.image-drop-zone');
    if (dz) {
      dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
      dz.addEventListener('drop', e => {
        e.preventDefault(); dz.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          const reader = new FileReader();
          reader.onload = ev => { child.content.src = ev.target.result; renderSectionChildren(sectionCard, sectionEl); saveState(); };
          reader.readAsDataURL(file);
        }
      });
    }
    const cap = childEl.querySelector('.image-caption');
    if (cap) cap.addEventListener('input', () => { child.content.caption = cap.innerText; saveState(); });
  }
  if (child.type === 'link') {
    const urlInput = childEl.querySelector('.link-url-input');
    const goBtn = childEl.querySelector('.link-go-btn');
    if (goBtn && urlInput) {
      const fetch = () => {
        const url = urlInput.value.trim(); if (!url) return;
        child.content.url = url.startsWith('http') ? url : 'https://' + url;
        child.content.favicon = `https://www.google.com/s2/favicons?domain=${getDomain(child.content.url)}&sz=32`;
        child.content.title = getDomain(child.content.url);
        renderSectionChildren(sectionCard, sectionEl); saveState();
      };
      goBtn.addEventListener('click', fetch);
      urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') fetch(); });
    }
  }
  if (child.type === 'swatch') {
    const fill = childEl.querySelector('.swatch-fill');
    if (fill) {
      fill.addEventListener('click', () => {
        openColorPicker(child.content.color || '#C9102E', fill, hex => {
          child.content.color = hex;
          fill.style.background = hex;
          const hexEl = childEl.querySelector('.swatch-hex');
          if (hexEl) hexEl.textContent = hex;
          saveState();
        }, child, true, sectionCard, sectionEl);
      });
    }
    const nameEl = childEl.querySelector('.swatch-name');
    if (nameEl) nameEl.addEventListener('input', () => { child.content.name = nameEl.innerText; saveState(); });
  }
}

function addCardToSection(canvasCard, sectionCard, sectionEl) {
  activeBoard().cards = activeBoard().cards.filter(c => c.id !== canvasCard.id);
  const el = getCardEl(canvasCard.id); if (el) el.remove();
  selectedCards.delete(canvasCard.id);
  if (!sectionCard.content.children) sectionCard.content.children = [];
  sectionCard.content.children.push(canvasCard);
  renderSectionChildren(sectionCard, sectionEl);
  updateEmptyState();
  saveStateNoHistory(); // startDrag already pushed pre-drag state
  showToast('Added to section');
}

function startSectionChildDrag(e, sectionCard, sectionEl, childId) {
  e.preventDefault(); e.stopPropagation();
  const content = sectionEl.querySelector('.section-content');
  const dragEl = sectionEl.querySelector(`[data-child-id="${childId}"]`);
  if (!dragEl || !content) return;

  const child = sectionCard.content.children.find(c => c.id === childId);
  if (!child) return;

  dragEl.classList.add('dragging-child');

  // Cache the section rect once — re-reading on every mousemove forces layout and causes lag
  let sectionRect = sectionEl.getBoundingClientRect();

  function clearIndicators() {
    content.querySelectorAll('.section-insert-indicator.active').forEach(i => i.classList.remove('active'));
  }

  function getInsertIdx(clientY) {
    const kids = [...content.querySelectorAll('.section-child:not(.dragging-child)')];
    for (let i = 0; i < kids.length; i++) {
      const r = kids[i].getBoundingClientRect();
      if (clientY < r.top + r.height / 2) return i;
    }
    return kids.length;
  }

  let lastIdx = -1;
  let detaching = false;

  function onMove(ev) {
    // Large detach zone — easy to pull things out
    const outside = ev.clientX < sectionRect.left - 80  || ev.clientX > sectionRect.right + 80 ||
                    ev.clientY < sectionRect.top  - 80  || ev.clientY > sectionRect.bottom + 80;
    if (outside) {
      if (!detaching) {
        detaching = true;
        clearIndicators();
        dragEl.style.opacity = '0.35';
        sectionEl.style.outline = '2px dashed rgba(201,16,46,0.5)';
      }
    } else {
      if (detaching) {
        detaching = false;
        dragEl.style.opacity = '';
        sectionEl.style.outline = '';
      }
      const idx = getInsertIdx(ev.clientY);
      if (idx !== lastIdx) {
        clearIndicators();
        lastIdx = idx;
        const inds = [...content.querySelectorAll('.section-insert-indicator')];
        if (inds[idx]) inds[idx].classList.add('active');
      }
    }
  }

  function onUp(ev) {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    dragEl.classList.remove('dragging-child');
    dragEl.style.opacity = '';
    sectionEl.style.outline = '';
    clearIndicators();

    if (detaching) {
      // Remove from section
      const fromIdx = sectionCard.content.children.findIndex(c => c.id === childId);
      if (fromIdx !== -1) sectionCard.content.children.splice(fromIdx, 1);

      // Place on canvas — preserve ALL original card data (dimensions, image data, style)
      const cp = screenToCanvas(ev.clientX, ev.clientY);
      const cw = child.w || (child.type === 'note' ? 240 : 280);
      const ch = child.h || (child.type === 'note' ? 160 : 160);
      const newCard = {
        id: uid(),
        type: child.type,
        x: cp.x - cw / 2,
        y: cp.y - ch / 2,
        w: cw,
        h: ch,
        style: JSON.parse(JSON.stringify(child.style || { background: '#C9102E', opacity: 1 })),
        content: JSON.parse(JSON.stringify(child.content)),
      };
      if (child.typography) newCard.typography = JSON.parse(JSON.stringify(child.typography));
      pushHistory();
      activeBoard().cards.push(newCard);
      renderSectionChildren(sectionCard, sectionEl);
      renderBoard();
      saveStateNoHistory();
    } else {
      // Reorder within section
      const fromIdx = sectionCard.content.children.findIndex(c => c.id === childId);
      const rawTo = getInsertIdx(ev.clientY);
      const toIdx = rawTo > fromIdx ? rawTo - 1 : rawTo;
      if (fromIdx !== -1 && fromIdx !== toIdx) {
        pushHistory();
        const [item] = sectionCard.content.children.splice(fromIdx, 1);
        sectionCard.content.children.splice(toIdx, 0, item);
        renderSectionChildren(sectionCard, sectionEl);
        saveStateNoHistory();
      }
    }
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch(e) { return url; }
}

// ── ATTACH CARD EVENTS ──
function attachCardEvents(el, card) {
  let mdPos = null;
  let preClickSelected = false;

  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    if (e.target.closest('.resize-handle, .crop-edge-handle')) return;

    mdPos = { x: e.clientX, y: e.clientY };
    preClickSelected = selectedCards.has(card.id) && !el.classList.contains('editing');

    // Sections drag from anywhere except section children (which have their own handlers)
    if (card.type === 'section') {
      if (!el.classList.contains('editing') && !e.target.closest('.section-child')) {
        startDrag(e, card, el);
      }
    } else {
      // Always interactive: todo check, swatch fill, table cells — don't drag from these
      if (e.target.closest('.todo-check')) { /* let click handle it */ }
      else if (card.type === 'swatch' && e.target.closest('.swatch-body') && el.classList.contains('editing')) { /* let click handle it */ }
      else if (card.type === 'table' && el.classList.contains('editing') && e.target.closest('.table-cell, .table-add-row, .table-add-col, .table-col-resize')) { /* in edit mode: let table handle */ }
      // In edit mode: don't drag from contenteditable or inputs
      else if (el.classList.contains('editing') && (e.target.isContentEditable || e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON')) { /* let it type */ }
      else {
        startDrag(e, card, el);
      }
    }

    // Select
    if (!e.shiftKey) {
      if (!selectedCards.has(card.id)) {
        selectedCards.clear();
        document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      }
    }
    selectedCards.add(card.id);
    el.classList.add('selected');
  });

  el.addEventListener('click', e => {
    if (!mdPos) return;
    const dx = e.clientX - mdPos.x, dy = e.clientY - mdPos.y;
    if (Math.sqrt(dx*dx + dy*dy) > 5) return; // was a drag

    // Board color dot → open color picker
    if (card.type === 'board' && e.target.closest('.board-color-dot')) {
      const dot = el.querySelector('.board-color-dot');
      openColorPicker(card.style.background || '#C9102E', dot, hex => {
        card.style.background = hex;
        applyCardStyle(el, card);
        if (dot) dot.style.background = hex;
        saveState();
      }, null, false, null, null);
      return;
    }
    // Board title click → inline rename (don't navigate)
    if (card.type === 'board' && e.target.closest('.board-card-title')) {
      const boardId = card.content.boardId;
      const titleEl = el.querySelector('.board-card-title');
      if (titleEl && boardId && state.boards[boardId]) {
        titleEl.contentEditable = 'true';
        titleEl.focus();
        const range = document.createRange();
        range.selectNodeContents(titleEl);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        function saveTitle() {
          titleEl.contentEditable = 'false';
          const newName = titleEl.innerText.trim() || 'Board';
          state.boards[boardId].name = newName;
          titleEl.textContent = newName;
          saveState();
        }
        titleEl.addEventListener('blur', saveTitle, { once: true });
        titleEl.addEventListener('keydown', ev => {
          if (ev.key === 'Enter') { ev.preventDefault(); titleEl.blur(); }
          if (ev.key === 'Escape') { titleEl.contentEditable = 'false'; titleEl.textContent = state.boards[boardId]?.name || 'Board'; titleEl.removeEventListener('blur', saveTitle); }
        });
      }
      return;
    }
    // Board "Open →" button or second click on non-title → navigate
    if (card.type === 'board' && (e.target.closest('.board-card-open') || preClickSelected)) {
      if (card.content.boardId) navigateToBoard(card.content.boardId, 'forward');
      return;
    }
    // Document: second click → open editor
    if (card.type === 'document' && preClickSelected) {
      openDocEditor(card, el);
      return;
    }
    // File: second click → open viewer
    if (card.type === 'file' && preClickSelected) {
      const fileId = card.content.fileId;
      const stored = fileId ? _fileStore.get(fileId) : null;
      if (stored) { openFileViewer(stored, card.content.fileType); }
      else { document.getElementById('file-upload-input')._reuploadCard = card; document.getElementById('file-upload-input')._reuploadEl = el; document.getElementById('file-upload-input').click(); }
      return;
    }
    // Image with photo: second click → enter crop-editing mode
    if (card.type === 'image' && card.content.src && preClickSelected) {
      enterEditMode(el, card, e);
      return;
    }
    // Swatch: double-click opens color picker
    if (card.type === 'swatch') {
      const body = el.querySelector('.swatch-body');
      openColorPicker(card.content.color || '#C9102E', body, hex => {
        card.content.color = hex;
        if (body) body.style.background = hex;
        const hexEl = el.querySelector('.swatch-hex');
        if (hexEl) hexEl.textContent = hex.toUpperCase();
        applyCardStyle(el, card);
        saveState();
      }, card, false, null, null);
      return;
    }
    // Todo checkbox: always works
    if (e.target.closest('.todo-check')) return;

    // Second click on selected card → enter edit mode (all types including section and board)
    if (preClickSelected) {
      enterEditMode(el, card, e);
    }
  });

  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    e.stopPropagation();
    if (!selectedCards.has(card.id)) {
      selectedCards.clear();
      document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
      selectedCards.add(card.id);
      el.classList.add('selected');
    }
    showCardContextMenu(e, card);
  });

  // Content events (work in both modes but only reachable in edit mode due to pointer-events CSS)
  if (card.type === 'note') {
    const content = el.querySelector('.note-content');
    content.addEventListener('focus', () => { activeNoteCard = card; showTypoToolbar(el, card); });
    content.addEventListener('blur', () => {
      setTimeout(() => { if (!typoToolbar.contains(document.activeElement)) hideTypoToolbar(); }, 150);
    });
    content.addEventListener('input', () => { card.content.text = content.innerHTML; saveState(); });
  }

  if (card.type === 'todo') {
    const titleEl = el.querySelector('.todo-title');
    titleEl.addEventListener('input', () => { card.content.title = titleEl.innerText; saveState(); });

    el.addEventListener('click', e => {
      if (!el.classList.contains('editing')) return;
      const check = e.target.closest('.todo-check');
      if (check) {
        const itemEl = check.closest('.todo-item');
        const item = card.content.items.find(i => i.id === itemEl.dataset.itemId);
        if (item) { item.done = !item.done; check.classList.toggle('checked', item.done); itemEl.querySelector('.todo-text').classList.toggle('done', item.done); saveState(); }
        return;
      }
      if (e.target.closest('.todo-add')) addTodoItem(card, el);
    });

    // Checkboxes always work regardless of edit mode
    el.addEventListener('click', e => {
      if (el.classList.contains('editing')) return; // handled above
      const check = e.target.closest('.todo-check');
      if (check) {
        const itemEl = check.closest('.todo-item');
        const item = card.content.items.find(i => i.id === itemEl.dataset.itemId);
        if (item) { item.done = !item.done; check.classList.toggle('checked', item.done); itemEl.querySelector('.todo-text').classList.toggle('done', item.done); saveState(); }
      }
    });

    el.querySelectorAll('.todo-text').forEach(textEl => attachTodoTextEvents(textEl, card, el));
  }

  if (card.type === 'image') {
    const dropZone = el.querySelector('.image-drop-zone');
    if (dropZone) {
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', e => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) loadImageFile(file, card, el);
      });
    }
    const cap = el.querySelector('.image-caption');
    if (cap) cap.addEventListener('input', () => { card.content.caption = cap.innerText; saveState(); });

    // Reposition handle: drag to pan
    const reposHandle = el.querySelector('.img-reposition');
    if (reposHandle) {
      if (card.content.imgW) {
        _attachImagePanHandle(reposHandle, card, el);
      } else {
        // Legacy: object-position pan
        reposHandle.addEventListener('mousedown', e => {
          e.preventDefault(); e.stopPropagation();
          const startX = e.clientX, startY = e.clientY;
          const startCX = card.content.cropX !== undefined ? card.content.cropX : 50;
          const startCY = card.content.cropY !== undefined ? card.content.cropY : 50;
          const img = el.querySelector('img');
          function onMove(ev) {
            const dx = ev.clientX - startX, dy = ev.clientY - startY;
            const newX = clamp(startCX - dx / (el.offsetWidth * zoom) * 100, 0, 100);
            const newY = clamp(startCY - dy / (el.offsetHeight * zoom) * 100, 0, 100);
            card.content.cropX = newX; card.content.cropY = newY;
            if (img) img.style.objectPosition = `${newX}% ${newY}%`;
          }
          function onUp() { saveState(); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      }
    }
  }

  if (card.type === 'link') {
    const urlInput = el.querySelector('.link-url-input');
    const goBtn = el.querySelector('.link-go-btn');
    const fetchLink = async () => {
      const raw = urlInput?.value.trim(); if (!raw) return;
      const url = raw.startsWith('http') ? raw : 'https://' + raw;
      card.content.url = url;
      card.content.loading = true;
      card.content.title = ''; card.content.desc = '';
      card.content.screenshot = null; card.content.favicon = null;
      refreshCardElement(card, el);

      // Always set a screenshot via thum.io (free, no key needed)
      card.content.screenshot = `https://image.thum.io/get/width/600/crop/400/${encodeURIComponent(url)}`;

      try {
        const res = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}`);
        const data = await res.json();
        if (data.status === 'success') {
          const d = data.data;
          card.content.title = d.title || getDomain(url);
          card.content.desc = d.description || '';
          card.content.favicon = d.logo?.url || `https://www.google.com/s2/favicons?domain=${getDomain(url)}&sz=32`;
          // Prefer OG image over screenshot if it exists and looks like a real image
          if (d.image?.url) card.content.screenshot = d.image.url;
        } else {
          card.content.title = getDomain(url);
          card.content.favicon = `https://www.google.com/s2/favicons?domain=${getDomain(url)}&sz=32`;
        }
      } catch (_) {
        card.content.title = getDomain(url);
        card.content.favicon = `https://www.google.com/s2/favicons?domain=${getDomain(url)}&sz=32`;
      }

      card.content.loading = false;
      refreshCardElement(card, el);
      saveState();
    };
    if (goBtn) goBtn.addEventListener('click', fetchLink);
    if (urlInput) urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); fetchLink(); } });

    // Click preview area to open URL (only when not editing)
    el.addEventListener('click', e => {
      if (el.classList.contains('editing')) return;
      if (!card.content.url) return;
      if (e.target.closest('.link-url-bar')) return;
      if (e.target.closest('.link-screenshot') || e.target.closest('.link-meta') || e.target.closest('.link-empty')) {
        window.open(card.content.url, '_blank', 'noopener');
      }
    });
  }

  if (card.type === 'swatch') {
    const nameEl = el.querySelector('.swatch-name');
    if (nameEl) nameEl.addEventListener('input', () => { card.content.name = nameEl.innerText; saveState(); });
  }

  if (card.type === 'section') {
    const labelEl = el.querySelector('.section-label');
    if (labelEl) labelEl.addEventListener('input', () => { card.content.label = labelEl.innerText; saveState(); });
  }

  if (card.type === 'file') {
    el.addEventListener('click', e => {
      if (e.target.closest('[data-reupload]')) {
        document.getElementById('file-upload-input')._reuploadCard = card;
        document.getElementById('file-upload-input')._reuploadEl = el;
        document.getElementById('file-upload-input').click();
      }
    });
  }

  if (card.type === 'table') {
    // Cell editing — save on input
    el.addEventListener('input', e => {
      const cell = e.target.closest('.table-cell');
      if (!cell) return;
      const r = parseInt(cell.dataset.row), c = parseInt(cell.dataset.col);
      const key = `${r}x${c}`;
      if (!card.content.cells) card.content.cells = {};
      card.content.cells[key] = { v: cell.textContent };
      saveState();
    });

    // Tab / Enter navigation
    el.addEventListener('keydown', e => {
      const cell = e.target.closest('.table-cell');
      if (!cell) return;
      const r = parseInt(cell.dataset.row), c = parseInt(cell.dataset.col);
      const { rows, cols } = card.content;
      let nr = r, nc = c;

      if (e.key === 'Tab') {
        e.preventDefault();
        if (e.shiftKey) { nc--; if (nc < 0) { nc = cols - 1; nr--; } }
        else { nc++; if (nc >= cols) { nc = 0; nr++; } }
        // Add row if tabbing past last cell
        if (nr >= rows) {
          card.content.rows++;
          const widths = card.content.colWidths || Array(cols).fill(Math.floor((card.w - 2) / cols));
          card.content.colWidths = widths;
          el.innerHTML = buildTableHTML(card);
          attachTableEvents(el, card);
          saveState();
          nr = rows; // now valid
        }
        const next = el.querySelector(`[data-row="${nr}"][data-col="${nc}"]`);
        if (next) { next.focus(); placeCursorAtEnd(next); }
      } else if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        nr++;
        if (nr >= rows) {
          card.content.rows++;
          el.innerHTML = buildTableHTML(card);
          attachTableEvents(el, card);
          saveState();
        }
        const next = el.querySelector(`[data-row="${nr}"][data-col="${nc}"]`);
        if (next) { next.focus(); placeCursorAtEnd(next); }
      }
    });

    attachTableEvents(el, card);
  }
}

function attachTableEvents(el, card) {
  // Add row button
  const addRow = el.querySelector('.table-add-row');
  if (addRow) addRow.onclick = () => {
    card.content.rows++;
    el.innerHTML = buildTableHTML(card);
    attachTableEvents(el, card);
    saveState();
  };
  // Add col button
  const addCol = el.querySelector('.table-add-col');
  if (addCol) addCol.onclick = () => {
    card.content.cols++;
    const defW = Math.floor((card.w - 2) / card.content.cols);
    card.content.colWidths = (card.content.colWidths || []).concat(defW);
    el.innerHTML = buildTableHTML(card);
    attachTableEvents(el, card);
    saveState();
  };
  // Column resize handles
  el.querySelectorAll('.table-col-resize').forEach(handle => {
    handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const colIdx = parseInt(handle.dataset.colResize);
      const startX = e.clientX;
      const startW = card.content.colWidths ? card.content.colWidths[colIdx] : Math.floor((card.w - 2) / card.content.cols);
      handle.classList.add('resizing');
      function onMove(ev) {
        const dx = (ev.clientX - startX) / zoom;
        const newW = Math.max(40, Math.round(startW + dx));
        if (!card.content.colWidths) card.content.colWidths = Array(card.content.cols).fill(Math.floor((card.w - 2) / card.content.cols));
        card.content.colWidths[colIdx] = newW;
        const thEl = el.querySelectorAll('th')[colIdx];
        if (thEl) thEl.style.width = newW + 'px';
      }
      function onUp() {
        handle.classList.remove('resizing');
        saveState();
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function placeCursorAtEnd(el) {
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(range);
}

function enterEditMode(el, card, e) {
  document.querySelectorAll('.card.editing').forEach(c => { if (c !== el) exitEditMode(c); });
  el.classList.add('editing');
  el.classList.add('selected');
  selectedCards.add(card.id);

  if (card.type === 'image') {
    // Crop mode: drag to pan, corner resize to crop frame
    // Caption editing: click the caption overlay directly
    return;
  }

  if (card.type === 'section') {
    const label = el.querySelector('.section-label');
    if (label) {
      setTimeout(() => {
        label.focus();
        const range = document.createRange();
        range.selectNodeContents(label);
        range.collapse(false);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
      }, 10);
    }
    const bar = el.querySelector('.section-label-bar') || el;
    openColorPicker(card.style.background || '#C9102E', bar, hex => {
      card.style.background = hex;
      applyCardStyle(el, card);
      saveState();
    }, null, false, null, null);
    return;
  }

  if (card.type === 'board') {
    if (card.content.boardId) navigateToBoard(card.content.boardId, 'forward');
    return;
  }

  if (card.type === 'shape') {
    openColorPicker(card.content.fill || '#1C1C1E', el, hex => {
      card.content.fill = hex;
      const svgG = el.querySelector('svg g');
      if (svgG) svgG.setAttribute('fill', hex);
      saveState();
    }, null, false, null, null);
    return;
  }

  // Focus best element near click
  let target = null;
  if (e) target = e.target.closest('[contenteditable], input');
  if (!target) target = el.querySelector('[contenteditable], input:not([type=color]):not([type=range])');
  if (target) {
    setTimeout(() => {
      target.focus();
      if (target.isContentEditable) {
        const range = document.createRange();
        range.selectNodeContents(target);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges(); sel.addRange(range);
      }
    }, 10);
  }
  if (card.type === 'note') {
    const content = el.querySelector('.note-content');
    if (content) { activeNoteCard = card; showTypoToolbar(el, card); }
  }
}

function exitEditMode(el) {
  const cap = el.querySelector('.image-caption');
  if (cap && !cap.textContent.trim()) cap.textContent = '';
  el.classList.remove('editing');
  hideTypoToolbar();
  if (el.contains(document.activeElement)) document.activeElement.blur();
}

function attachTodoTextEvents(textEl, card, el) {
  const itemEl = textEl.closest('.todo-item');
  const itemId = itemEl.dataset.itemId;

  textEl.addEventListener('input', () => {
    const item = card.content.items.find(i => i.id === itemId);
    if (item) { item.text = textEl.innerText; saveState(); }
  });

  textEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault();
      addTodoItem(card, el, itemId);
    } else if (e.key === 'Backspace' && textEl.innerText === '') {
      e.preventDefault();
      const idx = card.content.items.findIndex(i => i.id === itemId);
      if (idx > 0) {
        card.content.items.splice(idx, 1);
        refreshCardElement(card, el);
        saveState();
        setTimeout(() => {
          const newItems = el.querySelectorAll('.todo-text');
          if (newItems[idx - 1]) newItems[idx - 1].focus();
        }, 0);
      }
    }
  });
}

function addTodoItem(card, el, afterId) {
  const newItem = { id: uid(), text: '', done: false };
  if (afterId) {
    const idx = card.content.items.findIndex(i => i.id === afterId);
    card.content.items.splice(idx + 1, 0, newItem);
  } else {
    card.content.items.push(newItem);
  }
  refreshCardElement(card, el);
  saveState();
  setTimeout(() => {
    const idx = card.content.items.findIndex(i => i.id === newItem.id);
    const textEls = el.querySelectorAll('.todo-text');
    if (textEls[idx]) textEls[idx].focus();
  }, 0);
}

function refreshCardElement(card, el) {
  el.innerHTML = buildCardHTML(card);

  if (card.type === 'note') {
    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    el.appendChild(rh);
    rh.addEventListener('mousedown', e => startResize(e, card, el));
  }
  if (card.type === 'image') {
    if (card.content.src) {
      el.style.height = card.h + 'px';
      // overflow stays visible so crop handles aren't clipped
      const cr = document.createElement('div');
      cr.className = 'shape-corner-resize';
      el.appendChild(cr);
      cr.addEventListener('mousedown', e => startCornerResize(e, card, el));
      // Edge crop handles
      ['n','s','e','w'].forEach(edge => {
        const eh = document.createElement('div');
        eh.className = 'crop-edge-handle';
        eh.dataset.edge = edge;
        el.appendChild(eh);
        eh.addEventListener('mousedown', e => startEdgeResize(e, card, el, edge));
      });
    } else {
      el.style.height = '';
      const rh = document.createElement('div');
      rh.className = 'resize-handle';
      el.appendChild(rh);
      rh.addEventListener('mousedown', e => startResize(e, card, el));
    }
  }
  if (card.type === 'document' || card.type === 'file') {
    const cr = document.createElement('div');
    cr.className = 'shape-corner-resize';
    el.appendChild(cr);
    cr.addEventListener('mousedown', e => startCornerResize(e, card, el));
  }

  attachCardEvents(el, card);
}

function _attachImagePanHandle(reposHandle, card, el) {
  reposHandle.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    const startX = e.clientX, startY = e.clientY;
    const startIX = card.content.imageX || 0;
    const startIY = card.content.imageY || 0;
    const imgEl = el.querySelector('img');
    function onMove(ev) {
      const dx = (ev.clientX - startX) / zoom;
      const dy = (ev.clientY - startY) / zoom;
      card.content.imageX = Math.min(0, Math.max(-(card.content.imgW - card.w), startIX + dx));
      card.content.imageY = Math.min(0, Math.max(-(card.content.imgH - card.h), startIY + dy));
      if (imgEl) { imgEl.style.left = card.content.imageX + 'px'; imgEl.style.top = card.content.imageY + 'px'; }
    }
    function onUp() { saveState(); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function loadImageFile(file, card, el) {
  const reader = new FileReader();
  reader.onload = evt => {
    card.content.src = evt.target.result;
    const imgProbe = new Image();
    imgProbe.onload = () => {
      // Set a fixed display size for the image. The card starts at that full size
      // so the whole image is visible. User drags edges to crop (shrink the frame),
      // then drags the pan handle to reposition the image within the frame.
      let imgW = imgProbe.naturalWidth;
      let imgH = imgProbe.naturalHeight;
      const maxW = 400;
      if (imgW > maxW) { imgH = Math.round(imgH * maxW / imgW); imgW = maxW; }

      card.content.imgW = imgW;
      card.content.imgH = imgH;
      card.content.imageX = 0;
      card.content.imageY = 0;
      card.w = imgW;
      card.h = imgH;
      el.style.width = card.w + 'px';
      el.style.height = card.h + 'px';

      // Surgical DOM update — do NOT call refreshCardElement (would double-attach events)
      const display = el.querySelector('.image-display');
      if (display) {
        display.className = 'image-display has-photo has-crop';
        display.innerHTML = `<img src="${card.content.src}" style="width:${imgW}px;height:${imgH}px;left:0px;top:0px">
          <div class="img-reposition" title="Drag to pan">${_reposIconSVG}</div>
          <div class="image-caption" contenteditable="true">${card.content.caption || ''}</div>`;
        const rh = display.querySelector('.img-reposition');
        if (rh) _attachImagePanHandle(rh, card, el);
        const cap = display.querySelector('.image-caption');
        if (cap) cap.addEventListener('input', () => { card.content.caption = cap.innerText; saveState(); });
      }

      // Swap the width-only resize handle for corner + edge crop handles
      el.querySelector('.resize-handle')?.remove();
      if (!el.querySelector('.shape-corner-resize')) {
        const cr = document.createElement('div');
        cr.className = 'shape-corner-resize';
        el.appendChild(cr);
        cr.addEventListener('mousedown', e => startCornerResize(e, card, el));
      }
      if (!el.querySelector('.crop-edge-handle')) {
        ['n','s','e','w'].forEach(edge => {
          const eh = document.createElement('div');
          eh.className = 'crop-edge-handle';
          eh.dataset.edge = edge;
          el.appendChild(eh);
          eh.addEventListener('mousedown', e => startEdgeResize(e, card, el, edge));
        });
      }
      saveState();
    };
    imgProbe.onerror = () => { refreshCardElement(card, el); saveState(); };
    imgProbe.src = evt.target.result;
  };
  reader.readAsDataURL(file);
}

// ── DRAG ──
function startDrag(e, card, el) {
  if (resizingCard) return;
  e.preventDefault();
  e.stopPropagation();

  pushHistory(); // capture pre-drag state

  const initX = e.clientX, initY = e.clientY;
  const origX = card.x, origY = card.y;

  let moved = false;
  const snapEnabled = !e.shiftKey;
  let hoveredSection = null;
  let hoveredBoard = null;

  const multiStart = {};
  if (selectedCards.has(card.id) && selectedCards.size > 1) {
    selectedCards.forEach(id => {
      const c = getCardData(id);
      if (c) multiStart[id] = { x: c.x, y: c.y };
    });
  }

  function findSectionAt(cx, cy) {
    if (card.type === 'section') return null;
    for (const c of activeBoard().cards) {
      if (c.type !== 'section' || c.id === card.id) continue;
      const secEl = getCardEl(c.id);
      if (!secEl) continue;
      const r = secEl.getBoundingClientRect();
      if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) return c;
    }
    return null;
  }

  function findBoardAt(cx, cy) {
    if (card.type === 'board' || card.type === 'section') return null;
    for (const c of activeBoard().cards) {
      if (c.type !== 'board' || c.id === card.id) continue;
      const bEl = getCardEl(c.id);
      if (!bEl) continue;
      const r = bEl.getBoundingClientRect();
      if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) return c;
    }
    return null;
  }

  function onMove(e) {
    const dx = (e.clientX - initX) / zoom;
    const dy = (e.clientY - initY) / zoom;
    if (!moved && Math.abs(dx) < 3 && Math.abs(dy) < 3) return;
    moved = true;

    if (selectedCards.has(card.id) && selectedCards.size > 1) {
      selectedCards.forEach(id => {
        const c = getCardData(id);
        const startPos = multiStart[id];
        if (c && startPos) {
          c.x = snapEnabled ? snap(startPos.x + dx) : startPos.x + dx;
          c.y = snapEnabled ? snap(startPos.y + dy) : startPos.y + dy;
          const cel = getCardEl(id);
          if (cel) { cel.style.left = c.x + 'px'; cel.style.top = c.y + 'px'; }
        }
      });
    } else {
      card.x = snapEnabled ? snap(origX + dx) : origX + dx;
      card.y = snapEnabled ? snap(origY + dy) : origY + dy;
      el.style.left = card.x + 'px';
      el.style.top = card.y + 'px';
    }
    el.classList.add('dragging');
    renderArrows();

    // Section highlight
    const sec = findSectionAt(e.clientX, e.clientY);
    if (sec !== hoveredSection) {
      if (hoveredSection) getCardEl(hoveredSection.id)?.classList.remove('drop-target');
      hoveredSection = sec;
      if (hoveredSection) getCardEl(hoveredSection.id)?.classList.add('drop-target');
    }

    // Board highlight (visual only — drop happens on mouseup)
    const brd = findBoardAt(e.clientX, e.clientY);
    if (brd !== hoveredBoard) {
      if (hoveredBoard) getCardEl(hoveredBoard.id)?.classList.remove('board-drop-active');
      hoveredBoard = brd;
      if (hoveredBoard) getCardEl(hoveredBoard.id)?.classList.add('board-drop-active');
    }
  }

  function onUp(e) {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    el.classList.remove('dragging');
    if (hoveredSection) getCardEl(hoveredSection.id)?.classList.remove('drop-target');
    if (hoveredBoard) getCardEl(hoveredBoard.id)?.classList.remove('board-drop-active');
    if (hoveredBoard && moved) {
      addCardToBoard(card, hoveredBoard);
    } else if (hoveredSection && moved) {
      addCardToSection(card, hoveredSection, getCardEl(hoveredSection.id));
    } else if (moved) {
      saveStateNoHistory();
    }
    renderArrows();
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function getCardData(id) {
  return activeBoard().cards.find(c => c.id === id);
}

function addCardToBoard(canvasCard, boardCard) {
  const boardId = boardCard.content.boardId;
  if (!boardId || !state.boards[boardId]) return;
  pushHistory();
  // Remove from current board
  const idx = activeBoard().cards.findIndex(c => c.id === canvasCard.id);
  if (idx === -1) return;
  activeBoard().cards.splice(idx, 1);
  // Add to target board, reset position to a clean spot
  const targetBoard = state.boards[boardId];
  const offsetX = 40 + (targetBoard.cards.length % 4) * 20;
  const offsetY = 40 + Math.floor(targetBoard.cards.length / 4) * 20;
  canvasCard.x = offsetX;
  canvasCard.y = offsetY;
  targetBoard.cards.push(canvasCard);
  // Remove card element from canvas
  getCardEl(canvasCard.id)?.remove();
  // Update board card count badge
  const boardEl = getCardEl(boardCard.id);
  if (boardEl) {
    const count = targetBoard.cards.length;
    boardEl.querySelectorAll('.board-card-count-badge').forEach(b => {
      b.textContent = count + ' item' + (count !== 1 ? 's' : '');
    });
    boardEl.querySelector('.board-card-meta').textContent = count + ' item' + (count !== 1 ? 's' : '');
  }
  saveState();
}

// ── RESIZE ──
function startResize(e, card, el) {
  e.preventDefault();
  e.stopPropagation();
  pushHistory(); // capture pre-resize state
  resizingCard = card;

  const startX = e.clientX, startY = e.clientY;
  const startW = card.w, startH = card.h;

  function onMove(e) {
    const dx = (e.clientX - startX) / zoom;
    const dy = (e.clientY - startY) / zoom;
    card.w = Math.max(120, snap(startW + dx));
    el.style.width = card.w + 'px';
    if (card.type !== 'note' && card.type !== 'todo' && card.type !== 'section') {
      card.h = Math.max(80, snap(startH + dy));
      el.style.height = card.h + 'px';
    }
  }

  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    resizingCard = null;
    saveStateNoHistory();
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function _clampImagePan(card, el) {
  if (!card.content.imgW) return;
  card.content.imageX = Math.min(0, Math.max(-(card.content.imgW - card.w), card.content.imageX || 0));
  card.content.imageY = Math.min(0, Math.max(-(card.content.imgH - card.h), card.content.imageY || 0));
  const img = el.querySelector('img');
  if (img) { img.style.left = card.content.imageX + 'px'; img.style.top = card.content.imageY + 'px'; }
}

function startCornerResize(e, card, el) {
  e.preventDefault();
  e.stopPropagation();
  pushHistory();
  resizingCard = card;
  const startX = e.clientX, startY = e.clientY;
  const startW = card.w, startH = card.h;

  // Scale mode: any loaded image in selection (not crop-editing) — scales proportionally, preserves crop ratio
  if (card.type === 'image' && card.content.src && !el.classList.contains('editing')) {
    const startImgW = card.content.imgW || 0;
    const startImgH = card.content.imgH || 0;
    const startIX = card.content.imageX || 0;
    const startIY = card.content.imageY || 0;
    function onScaleMove(ev) {
      const dx = (ev.clientX - startX) / zoom;
      const scale = Math.max(0.15, (startW + dx) / startW);
      card.w = Math.max(60, Math.round(startW * scale));
      card.h = Math.max(40, Math.round(startH * scale));
      el.style.width = card.w + 'px';
      el.style.height = card.h + 'px';
      if (startImgW) {
        // New crop system: scale the underlying image dimensions and pan offset too
        card.content.imgW = Math.max(60, Math.round(startImgW * scale));
        card.content.imgH = Math.max(40, Math.round(startImgH * scale));
        card.content.imageX = Math.min(0, Math.max(-(card.content.imgW - card.w), Math.round(startIX * scale)));
        card.content.imageY = Math.min(0, Math.max(-(card.content.imgH - card.h), Math.round(startIY * scale)));
        const img = el.querySelector('img');
        if (img) {
          img.style.width = card.content.imgW + 'px';
          img.style.height = card.content.imgH + 'px';
          img.style.left = card.content.imageX + 'px';
          img.style.top = card.content.imageY + 'px';
        }
      }
    }
    function onScaleUp() {
      document.removeEventListener('mousemove', onScaleMove);
      document.removeEventListener('mouseup', onScaleUp);
      resizingCard = null;
      saveStateNoHistory();
    }
    document.addEventListener('mousemove', onScaleMove);
    document.addEventListener('mouseup', onScaleUp);
    return;
  }

  // Crop mode (editing, or no image loaded): free resize capped at underlying image size
  function onMove(ev) {
    const dx = (ev.clientX - startX) / zoom;
    const dy = (ev.clientY - startY) / zoom;
    const maxW = card.content.imgW || Infinity;
    const maxH = card.content.imgH || Infinity;
    card.w = Math.min(maxW, Math.max(40, snap(startW + dx)));
    card.h = Math.min(maxH, Math.max(40, snap(startH + dy)));
    el.style.width = card.w + 'px';
    el.style.height = card.h + 'px';
    _clampImagePan(card, el);
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    resizingCard = null;
    saveStateNoHistory();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startEdgeResize(e, card, el, edge) {
  e.preventDefault(); e.stopPropagation();
  pushHistory(); // capture pre-resize state
  resizingCard = card;
  const startX = e.clientX, startY = e.clientY;
  const startW = card.w, startH = card.h, startCX = card.x, startCY = card.y;
  function onMove(ev) {
    const dx = (ev.clientX - startX) / zoom;
    const dy = (ev.clientY - startY) / zoom;
    const maxW = card.content.imgW || Infinity;
    const maxH = card.content.imgH || Infinity;
    if (edge === 'e') { card.w = Math.min(maxW, Math.max(60, snap(startW + dx))); }
    else if (edge === 's') { card.h = Math.min(maxH, Math.max(60, snap(startH + dy))); }
    else if (edge === 'w') { const nw = Math.min(maxW, Math.max(60, snap(startW - dx))); card.x = startCX + startW - nw; card.w = nw; el.style.left = card.x + 'px'; }
    else if (edge === 'n') { const nh = Math.min(maxH, Math.max(60, snap(startH - dy))); card.y = startCY + startH - nh; card.h = nh; el.style.top = card.y + 'px'; }
    el.style.width = card.w + 'px'; el.style.height = card.h + 'px';
    _clampImagePan(card, el);
  }
  function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); resizingCard = null; saveStateNoHistory(); }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ── FILE DROP ON CANVAS ──
// Intercept image files dragged from desktop/finder so they create image cards
// instead of the browser navigating to the file URL.
viewport.addEventListener('dragover', e => {
  if ([...e.dataTransfer.types].includes('Files')) {
    e.preventDefault();
    e.stopPropagation();
  }
});
viewport.addEventListener('drop', e => {
  const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
  if (files.length === 0) return;
  e.preventDefault();
  e.stopPropagation();
  files.forEach((file, i) => {
    const card = addCard('image', e.clientX + i * 20, e.clientY + i * 20);
    if (card) {
      const el = getCardEl(card.id);
      if (el) loadImageFile(file, card, el);
    }
  });
});

// ── PAN ──
viewport.addEventListener('mousedown', e => {
  if (e.target !== viewport && e.target !== canvas && e.target !== dotGridCanvas) return;
  if (e.button !== 0) return;

  // Start rubber-band selection
  const rect = viewport.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  selectStart = { sx, sy, cx: (sx - pan.x) / zoom, cy: (sy - pan.y) / zoom };
  isSelecting = true;

  selectedCards.clear();
  document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));

  e.preventDefault(); // prevent browser text selection during rubber-band
  selectionRect.style.display = 'none';
  selectionRect.style.left = sx + 'px'; selectionRect.style.top = sy + 'px';
  selectionRect.style.width = '0'; selectionRect.style.height = '0';

  document.addEventListener('mousemove', onSelectMove);
  document.addEventListener('mouseup', onSelectUp);
});

let spaceDown = false;
document.addEventListener('keydown', e => { if (e.code === 'Space' && !e.target.isContentEditable) spaceDown = true; });
document.addEventListener('keyup', e => { if (e.code === 'Space') spaceDown = false; });

viewport.addEventListener('mousedown', e => {
  if (!spaceDown && e.button !== 1 && e.target !== viewport && e.target !== canvas && e.target !== dotGridCanvas) return;
  if (spaceDown || e.button === 1) {
    e.preventDefault();
    isPanning = true;
    panStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
    viewport.style.cursor = 'grabbing';

    const onMove = e => {
      closeColorPicker(); closeQuickColorPicker();
      pan.x = e.clientX - panStart.x;
      pan.y = e.clientY - panStart.y;
      applyTransform(false);
    };
    const onUp = () => {
      isPanning = false;
      viewport.style.cursor = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }
});

function onSelectMove(e) {
  if (!isSelecting) return;
  const rect = viewport.getBoundingClientRect();
  const ex = e.clientX - rect.left, ey = e.clientY - rect.top;
  const w = Math.abs(ex - selectStart.sx);
  const h = Math.abs(ey - selectStart.sy);

  // Don't start showing/selecting until dragged at least 6px
  if (w < 6 && h < 6) return;

  const x = Math.min(ex, selectStart.sx);
  const y = Math.min(ey, selectStart.sy);

  selectionRect.style.display = 'block';
  selectionRect.style.left = x + 'px'; selectionRect.style.top = y + 'px';
  selectionRect.style.width = w + 'px'; selectionRect.style.height = h + 'px';

  // Hit test in screen space — matches the visual selection box exactly
  const boxLeft   = x + rect.left;
  const boxTop    = y + rect.top;
  const boxRight  = boxLeft + w;
  const boxBottom = boxTop  + h;

  selectedCards.clear();
  document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));

  activeBoard().cards.forEach(card => {
    const el = getCardEl(card.id);
    if (!el) return;
    const r = el.getBoundingClientRect();
    if (r.left < boxRight && r.right > boxLeft && r.top < boxBottom && r.bottom > boxTop) {
      selectedCards.add(card.id);
      el.classList.add('selected');
    }
  });
}

function onSelectUp() {
  isSelecting = false;
  selectionRect.style.display = 'none';
  document.removeEventListener('mousemove', onSelectMove);
  document.removeEventListener('mouseup', onSelectUp);
}

// ── ZOOM ──
let _wheelTarget = { zoom: null, panX: null, panY: null, raf: null, isZoom: false };

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  closeColorPicker(); closeQuickColorPicker();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  if (e.ctrlKey || e.metaKey) {
    // Zoom: cursor-anchored — accumulate from current targets (not current actual values)
    const currentZoom = _wheelTarget.zoom ?? zoom;
    const currentPanX = _wheelTarget.panX ?? pan.x;
    const currentPanY = _wheelTarget.panY ?? pan.y;
    const rawDelta = e.deltaY;
    const step = clamp(rawDelta * 0.0024, -0.18, 0.18);
    const factor = 1 - step;
    const newZoom = clamp(currentZoom * factor, 0.1, 8);
    _wheelTarget.zoom = newZoom;
    _wheelTarget.panX = mx - (mx - currentPanX) * (newZoom / currentZoom);
    _wheelTarget.panY = my - (my - currentPanY) * (newZoom / currentZoom);
    _wheelTarget.isZoom = true;
  } else {
    // Pan only
    _wheelTarget.panX = (_wheelTarget.panX ?? pan.x) - e.deltaX;
    _wheelTarget.panY = (_wheelTarget.panY ?? pan.y) - e.deltaY;
    if (_wheelTarget.zoom === null) _wheelTarget.zoom = zoom;
    _wheelTarget.isZoom = false;
  }

  // Animate toward target with lerp
  if (_wheelTarget.raf) return;
  function tick() {
    // Zoom and pan MUST use the same lerp factor during zoom — otherwise the
    // cursor-anchor formula breaks and the canvas drifts sideways.
    const SPEED = _wheelTarget.isZoom ? 0.96 : 0.30;
    const tz = _wheelTarget.zoom ?? zoom;
    const tx = _wheelTarget.panX ?? pan.x;
    const ty = _wheelTarget.panY ?? pan.y;

    zoom  = zoom  + (tz - zoom)  * SPEED;
    pan.x = pan.x + (tx - pan.x) * SPEED;
    pan.y = pan.y + (ty - pan.y) * SPEED;

    const settled = Math.abs(tz - zoom) < 0.0001 &&
                    Math.abs(tx - pan.x) < 0.05 &&
                    Math.abs(ty - pan.y) < 0.05;

    if (settled) {
      zoom = tz; pan.x = tx; pan.y = ty;
      _wheelTarget = { zoom: null, panX: null, panY: null, raf: null, isZoom: false };
    } else {
      _wheelTarget.raf = requestAnimationFrame(tick);
    }
    applyTransform(false);
    if (arrowMode) refreshSnapDotSizes();
  }
  _wheelTarget.raf = requestAnimationFrame(tick);
}, { passive: false });

document.getElementById('zoom-in').addEventListener('click', () => {
  const center = { x: viewport.offsetWidth / 2, y: viewport.offsetHeight / 2 };
  const newZoom = clamp(zoom * 1.2, 0.2, 5);
  pan.x = center.x - (center.x - pan.x) * (newZoom / zoom);
  pan.y = center.y - (center.y - pan.y) * (newZoom / zoom);
  zoom = newZoom;
  applyTransform(true);
});

document.getElementById('zoom-out').addEventListener('click', () => {
  const center = { x: viewport.offsetWidth / 2, y: viewport.offsetHeight / 2 };
  const newZoom = clamp(zoom * 0.8, 0.2, 5);
  pan.x = center.x - (center.x - pan.x) * (newZoom / zoom);
  pan.y = center.y - (center.y - pan.y) * (newZoom / zoom);
  zoom = newZoom;
  applyTransform(true);
});

// ── FIT ──
document.getElementById('fit-btn').addEventListener('click', fitToScreen);
function fitToScreen(ids) {
  const cards = ids
    ? activeBoard().cards.filter(c => ids.has(c.id))
    : activeBoard().cards;
  if (cards.length === 0) { pan = {x: 200, y: 200}; zoom = 1; applyTransform(true); return; }

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  cards.forEach(c => {
    const el = getCardEl(c.id);
    const w = el ? el.offsetWidth : c.w;
    const h = el ? el.offsetHeight : c.h;
    minX = Math.min(minX, c.x); minY = Math.min(minY, c.y);
    maxX = Math.max(maxX, c.x + w); maxY = Math.max(maxY, c.y + h);
  });

  const pad = 80;
  const vw = viewport.offsetWidth, vh = viewport.offsetHeight;
  const bw = maxX - minX + pad * 2, bh = maxY - minY + pad * 2;
  const newZoom = clamp(Math.min(vw / bw, vh / bh), 0.2, 2);
  pan.x = (vw - (maxX - minX) * newZoom) / 2 - minX * newZoom;
  pan.y = (vh - (maxY - minY) * newZoom) / 2 - minY * newZoom;
  zoom = newZoom;
  applyTransform(true);
}

// ── TOOLBAR ADD BUTTONS ──
let _dockDragDrop = false; // set true when a drag-drop placed a card — skip click

document.querySelectorAll('.add-btn[data-type], .dock-btn[data-type]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (_dockDragDrop) { _dockDragDrop = false; return; }
    const type = btn.dataset.type;
    const cx = viewport.offsetWidth / 2;
    const cy = viewport.offsetHeight / 2;
    addCard(type, cx + viewport.getBoundingClientRect().left, cy + viewport.getBoundingClientRect().top);
  });
});

// ── DOCK DRAG-TO-CANVAS ──
(function initDockDrag() {
  document.querySelectorAll('.dock-btn[data-type]').forEach(btn => {
    btn.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      const type = btn.dataset.type;
      const svgEl = btn.querySelector('svg');
      const label = btn.textContent.trim();
      const startX = e.clientX, startY = e.clientY;
      let dragging = false;
      let ghost = null;

      function createGhost(x, y) {
        ghost = document.createElement('div');
        ghost.className = 'dock-drag-ghost';
        ghost.innerHTML = (svgEl ? svgEl.outerHTML : '') + `<span>${label}</span>`;
        document.body.appendChild(ghost);
        moveGhost(x, y);
      }
      function moveGhost(x, y) {
        if (!ghost) return;
        ghost.style.left = x + 'px';
        ghost.style.top = y + 'px';
      }
      function removeGhost() {
        if (ghost) { ghost.remove(); ghost = null; }
        viewport.classList.remove('dock-drag-drop-zone');
      }

      function onMove(mv) {
        if (!dragging && (Math.abs(mv.clientX - startX) > 6 || Math.abs(mv.clientY - startY) > 6)) {
          dragging = true;
          createGhost(mv.clientX, mv.clientY);
        }
        if (!dragging) return;
        moveGhost(mv.clientX, mv.clientY);
        const vr = viewport.getBoundingClientRect();
        const over = mv.clientX >= vr.left && mv.clientX <= vr.right && mv.clientY >= vr.top && mv.clientY <= vr.bottom;
        viewport.classList.toggle('dock-drag-drop-zone', over);
      }

      function onUp(ev) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        if (dragging) {
          const vr = viewport.getBoundingClientRect();
          const over = ev.clientX >= vr.left && ev.clientX <= vr.right && ev.clientY >= vr.top && ev.clientY <= vr.bottom;
          if (over) {
            _dockDragDrop = true;
            addCard(type, ev.clientX, ev.clientY);
          }
          removeGhost();
        }
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
})();

function handleCardAction(action, card) {
  if (action === 'style') {
    if (card.type === 'document' || card.type === 'file') return;
    showStylePanel(card);
  } else if (action === 'duplicate') {
    if (selectedCards.size > 1) {
      selectedCards.forEach(id => {
        const c = getCardData(id);
        if (c) duplicateCard(c);
      });
    } else {
      duplicateCard(card);
    }
  } else if (action === 'delete') {
    pushHistory(); // capture pre-delete state
    if (selectedCards.size > 1) {
      [...selectedCards].forEach(id => deleteCard(id));
    } else {
      deleteCard(card.id);
    }
  } else if (action === 'bring-front') {
    bringToFront(card);
  } else if (action === 'send-back') {
    sendToBack(card);
  }
}

function duplicateCard(card) {
  pushHistory(); // capture pre-duplicate state
  const newCard = JSON.parse(JSON.stringify(card));
  newCard.id = uid();
  newCard.x += 20; newCard.y += 20;
  activeBoard().cards.push(newCard);
  const el = createCardElement(newCard);
  canvas.appendChild(el);
  updateEmptyState();
  saveStateNoHistory();
}

function deleteCard(id) {
  // Close color pickers if they belong to this card
  if (cpSourceCard && cpSourceCard.id === id) closeColorPicker();
  if (qcpCard && qcpCard.id === id) closeQuickColorPicker();

  const el = getCardEl(id);
  if (el) {
    el.style.transition = 'opacity 180ms ease, transform 180ms ease';
    el.style.opacity = '0';
    el.style.transform = `scale(0.94)`;
    setTimeout(() => { el.remove(); }, 180);
  }
  const board = activeBoard();
  board.cards = board.cards.filter(c => c.id !== id);
  selectedCards.delete(id);
  updateEmptyState();
  saveStateNoHistory();
}

function bringToFront(card) {
  const board = activeBoard();
  const idx = board.cards.findIndex(c => c.id === card.id);
  if (idx > -1) {
    board.cards.push(board.cards.splice(idx, 1)[0]);
    getCardEl(card.id)?.style.setProperty('z-index', '100');
  }
  saveState();
}

function sendToBack(card) {
  const board = activeBoard();
  const idx = board.cards.findIndex(c => c.id === card.id);
  if (idx > -1) {
    board.cards.unshift(board.cards.splice(idx, 1)[0]);
    getCardEl(card.id)?.style.removeProperty('z-index');
  }
  saveState();
}

// ── STYLE PANEL ──
const BG_SWATCHES = ['#C9102E','#EFEDE7','#EFEDE7','#C9102E','#D4A5A5','#E8D5D5','#EFEDE7','#EFEDE7','#3A3A3C','#2C2C2E','#1C1C1E','#48484A','#D1C4B0','#B8CCC4','#C4B4CC','#CCB8B8'];

let stylePanelCard = null;

function buildStylePanel() {
  function makeSwatchOpt(color, container) {
    const s = document.createElement('div');
    s.className = 'swatch-opt';
    s.style.background = color;
    const lum = textColorForBg(color);
    if (lum === 'dark') s.style.border = '1.5px solid var(--separator)';
    s.title = color;
    s.addEventListener('click', () => {
      if (!stylePanelCard) return;
      stylePanelCard.style.background = color;
      const el = getCardEl(stylePanelCard.id);
      if (el) applyCardStyle(el, stylePanelCard);
      document.querySelectorAll('#style-panel .swatch-opt').forEach(o => o.classList.remove('selected'));
      s.classList.add('selected');
      document.getElementById('custom-bg-color').value = color;
      saveState();
    });
    container.appendChild(s);
    return s;
  }

  // Theme colors
  const themeSection = document.getElementById('sp-theme-section');
  const themeGrid = document.getElementById('sp-theme-swatches');
  themeGrid.innerHTML = '';
  if (state.theme && state.theme.length > 0) {
    themeSection.style.display = '';
    state.theme.forEach(c => makeSwatchOpt(c, themeGrid));
  } else {
    themeSection.style.display = 'none';
  }

  // Board swatch colors
  const boardSection = document.getElementById('sp-board-section');
  const boardGrid = document.getElementById('sp-board-swatches');
  boardGrid.innerHTML = '';
  const boardSwatches = activeBoard().cards.filter(c => c.type === 'swatch' && c.content.color);
  if (boardSwatches.length > 0) {
    boardSection.style.display = '';
    boardSwatches.forEach(c => makeSwatchOpt(c.content.color, boardGrid));
  } else {
    boardSection.style.display = 'none';
  }

  // Preset colors
  const bgGrid = document.getElementById('bg-swatches');
  bgGrid.innerHTML = '';
  BG_SWATCHES.forEach(color => makeSwatchOpt(color, bgGrid));

  // Mark current color selected across all grids
  const currentBg = (stylePanelCard?.style?.background || '').toLowerCase();
  document.querySelectorAll('#style-panel .swatch-opt').forEach(o => {
    o.classList.toggle('selected', o.title.toLowerCase() === currentBg);
  });
}

function showStylePanel(card) {
  stylePanelCard = card;
  buildStylePanel();

  const customPicker = document.getElementById('custom-bg-color');
  customPicker.value = card.style.background || '#C9102E';
  customPicker.oninput = () => {
    card.style.background = customPicker.value;
    const el = getCardEl(card.id);
    if (el) applyCardStyle(el, card);
    saveState();
  };

  stylePanel.style.display = 'block';
  const el = getCardEl(card.id);
  if (el) {
    const rect = el.getBoundingClientRect();
    stylePanel.style.left = Math.min(rect.right + 10, window.innerWidth - 300) + 'px';
    stylePanel.style.top = Math.min(rect.top, window.innerHeight - 350) + 'px';
  }
}

  stylePanel.style.display = 'none';
  stylePanelCard = null;
});

function showTypoToolbar(cardEl, card) {
  const t = card.typography;
  document.getElementById('font-select').value = t.fontFamily;

  // Text style buttons
  const sz = t.fontSize || 14;
  let style = 'para';
  if (sz >= 28) style = 'title';
  else if (sz >= 18) style = 'sub';
  document.querySelectorAll('[data-textstyle]').forEach(b => b.classList.toggle('active', b.dataset.textstyle === style));

  // Bold toggle
  const boldBtn = document.getElementById('bold-toggle');
  if (boldBtn) boldBtn.classList.toggle('active', (t.fontWeight || 400) >= 600);

  typoToolbar.querySelectorAll('[data-cmd]').forEach(b => {
    if (b.dataset.cmd === 'italic') b.classList.toggle('active', !!t.italic);
    if (b.dataset.cmd === 'underline') b.classList.toggle('active', !!t.underline);
  });
  typoToolbar.querySelectorAll('[data-align]').forEach(b => b.classList.toggle('active', b.dataset.align === (t.align || 'left')));

  typoToolbar.style.display = 'flex';
  positionTypoToolbar(cardEl);
}

function positionTypoToolbar(cardEl) {
  const rect = cardEl.getBoundingClientRect();
  const tw = typoToolbar.offsetWidth || 400;
  let left = rect.left + rect.width / 2 - tw / 2;
  left = clamp(left, 8, window.innerWidth - tw - 8);
  typoToolbar.style.left = left + 'px';
  typoToolbar.style.top = Math.max(8, rect.top - 54) + 'px';
}

function hideTypoToolbar() {
  typoToolbar.style.display = 'none';
  activeNoteCard = null;
}

// Text style buttons
const TEXT_STYLES = { title: { size: 32, weight: 700 }, sub: { size: 20, weight: 600 }, para: { size: 15, weight: 400 } };

  const isBold = (activeNoteCard.typography.fontWeight || 400) >= 600;
  activeNoteCard.typography.fontWeight = isBold ? 400 : 700;

  document.getElementById('bold-toggle').classList.toggle('active', !isBold);
});

typoToolbar.querySelectorAll('[data-cmd]').forEach(btn => {

    const cmd = btn.dataset.cmd;
    activeNoteCard.typography[cmd] = !activeNoteCard.typography[cmd];
    updateNoteTypography(activeNoteCard);
    btn.classList.toggle('active', activeNoteCard.typography[cmd]);
  });
});

typoToolbar.querySelectorAll('[data-align]').forEach(btn => {

    activeNoteCard.typography.align = btn.dataset.align;

function updateNoteTypography(card) {
  const el = getCardEl(card.id);
  if (!el) return;
  const content = el.querySelector('.note-content');
  if (!content) return;
  const t = card.typography;
  content.style.fontFamily = t.fontFamily;
  content.style.fontSize = t.fontSize + 'px';
  content.style.fontWeight = t.fontWeight;
  content.style.fontStyle = t.italic ? 'italic' : 'normal';
  content.style.textDecoration = t.underline ? 'underline' : 'none';
  content.style.textAlign = t.align;
  content.style.color = t.color;
  content.style.lineHeight = t.lineHeight;
  content.style.letterSpacing = t.letterSpacing + 'em';
  saveState();
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  // Undo/redo work even in edit mode
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if ((e.metaKey || e.ctrlKey) && (e.key === 'Z' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }

  if (e.key === 'Escape') {
    if (document.getElementById('doc-editor').style.display !== 'none') { closeDocEditor(); return; }
    if (document.getElementById('file-viewer').style.display !== 'none') { closeFileViewer(); return; }
  }

  if (e.target.isContentEditable || e.target.tagName === 'INPUT') return;

  if (e.key === 'Escape') {
    const editing = document.querySelectorAll('.card.editing');
    if (editing.length) { editing.forEach(exitEditMode); return; }
    selectedCards.clear();
    document.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
    hideCtxMenu();
    stylePanel.style.display = 'none';
    hideTypoToolbar();
    return;
  }

  if ((e.key === 'Backspace' || e.key === 'Delete') && selectedCards.size > 0) {
    pushHistory(); // capture pre-delete state
    [...selectedCards].forEach(id => deleteCard(id));
    return;
  }

  if (e.key === 'n' && !e.metaKey) { addCard('note', viewport.offsetWidth/2 + viewport.getBoundingClientRect().left, viewport.offsetHeight/2 + viewport.getBoundingClientRect().top); return; }
  if (e.key === 't' && !e.metaKey) { addCard('todo', viewport.offsetWidth/2 + viewport.getBoundingClientRect().left, viewport.offsetHeight/2 + viewport.getBoundingClientRect().top); return; }
  if (e.key === 'i' && !e.metaKey) { addCard('image', viewport.offsetWidth/2 + viewport.getBoundingClientRect().left, viewport.offsetHeight/2 + viewport.getBoundingClientRect().top); return; }

  if ((e.metaKey || e.ctrlKey) && e.key === '0') { e.preventDefault(); fitToScreen(); return; }
  if ((e.metaKey || e.ctrlKey) && (e.key === '=' || e.key === '+')) {
    e.preventDefault();
    const center = { x: viewport.offsetWidth/2, y: viewport.offsetHeight/2 };
    const nz = clamp(zoom * 1.2, 0.2, 5);
    pan.x = center.x - (center.x - pan.x) * (nz/zoom);
    pan.y = center.y - (center.y - pan.y) * (nz/zoom);
    zoom = nz; applyTransform(true); return;
  }
  if ((e.metaKey || e.ctrlKey) && e.key === '-') {
    e.preventDefault();
    const center = { x: viewport.offsetWidth/2, y: viewport.offsetHeight/2 };
    const nz = clamp(zoom * 0.8, 0.2, 5);
    pan.x = center.x - (center.x - pan.x) * (nz/zoom);
    pan.y = center.y - (center.y - pan.y) * (nz/zoom);
    zoom = nz; applyTransform(true); return;
  }

  if ((e.metaKey || e.ctrlKey) && e.key === 'd') {
    e.preventDefault();
    if (selectedCards.size > 0) {
      selectedCards.forEach(id => {
        const c = getCardData(id);
        if (c) duplicateCard(c);
      });
    }
    return;
  }

  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'F') {
    e.preventDefault();
    fitToScreen(selectedCards.size > 0 ? selectedCards : null);
    return;
  }
});

function showConfirm(title, body, onOk) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-body').textContent = body;
  confirmPop.classList.add('show');
  overlay.classList.add('show');

  const okBtn = document.getElementById('confirm-ok');

    confirmPop.classList.remove('show');
    overlay.classList.remove('show');

}

document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.boards || !imported.activeBoard) throw new Error('Invalid format');
      state = imported;
      const b = activeBoard();
      pan = { ...b.pan }; zoom = b.zoom || 1;
      renderBoard();
      showToast('Board imported');
    } catch(err) {
      showToast('Invalid JSON file');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

        if (el) loadImageFile(file, card, el);

});
